<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="커피 레시피">
<title>커피 레시피</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f6f4f1;--surface:#fff;--card:#fff;--card2:#f5f1ec;
  --primary:#d4622a;--primary-bg:#fef2eb;
  --text:#1c1108;--text-2:#705040;--text-3:#b09888;
  --border:#ece5dc;
  --shadow:0 2px 12px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);
  --shadow-sm:0 1px 4px rgba(0,0,0,.06);
  --danger:#d93025;--radius:14px;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,'Noto Sans KR',sans-serif;font-size:16px;line-height:1.5;overflow:hidden;}
#app{height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
#app-header{height:56px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,.06);}
.btn-icon{width:40px;height:40px;border:none;background:none;color:var(--primary);
  font-size:20px;cursor:pointer;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.btn-icon:active{background:var(--primary-bg);}
.btn-icon.hidden{visibility:hidden;pointer-events:none;}
#header-title{flex:1;text-align:center;font-size:17px;font-weight:700;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#screens{flex:1;overflow:hidden;position:relative;}
.screen{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  touch-action:pan-y;overscroll-behavior:contain;padding:16px;
  display:none;flex-direction:column;gap:12px;}
.screen.active{display:flex;}
.search-box{position:relative;}
.search-box input{width:100%;padding:13px 16px 13px 44px;background:var(--surface);
  border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);
  font-size:15px;outline:none;box-shadow:var(--shadow-sm);}
.search-box input::placeholder{color:var(--text-3);}
.search-box input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(212,98,42,.12);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none;}
.card{background:var(--card);border-radius:var(--radius);padding:14px 16px;cursor:pointer;
  box-shadow:var(--shadow);transition:transform .12s;}
.card:active{transform:scale(.985);}
.card-title{font-size:16px;font-weight:600;}
.card-sub{font-size:13px;color:var(--text-2);margin-top:3px;}
.card-row{display:flex;align-items:center;justify-content:space-between;}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.tag{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.tag-roast{background:var(--primary-bg);color:var(--primary);}
.tag-hot{background:#fff0ed;color:#d04020;}
.tag-ice{background:#eaf4ff;color:#2878c0;}
.tag-esp{background:#fdf5e8;color:#b06820;}
.tag-deg{background:#f0f0ff;color:#5858c0;}
.section-label{font-size:12px;font-weight:700;color:var(--text-3);
  text-transform:uppercase;letter-spacing:.08em;padding:4px 2px;}
.bean-header{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
.bean-name{font-size:22px;font-weight:800;}
.bean-roaster{font-size:14px;font-weight:600;color:var(--primary);margin-top:5px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px;}
.info-item{background:var(--card2);border-radius:10px;padding:10px 12px;}
.info-item label{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;}
.info-item span{display:block;font-size:13px;font-weight:600;color:var(--text);margin-top:3px;}
.bean-note{margin-top:12px;padding:10px 12px;background:var(--primary-bg);border-radius:10px;font-size:13px;color:var(--text-2);}
.recipe-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;cursor:pointer;
  margin-bottom:8px;box-shadow:var(--shadow);transition:transform .12s;}
.recipe-card:active{transform:scale(.985);}
.recipe-stats{display:flex;margin-top:12px;background:var(--card2);border-radius:10px;overflow:hidden;}
.stat-cell{flex:1;padding:10px 8px;text-align:center;border-right:1px solid var(--border);}
.stat-cell:last-child{border-right:none;}
.stat-v{font-size:17px;font-weight:800;color:var(--primary);}
.stat-l{font-size:10px;color:var(--text-3);font-weight:600;text-transform:uppercase;margin-top:2px;}
.detail-header{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
.detail-item{background:var(--card2);border-radius:10px;padding:10px 12px;}
.detail-item label{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;}
.detail-item span{display:block;font-size:16px;font-weight:800;color:var(--primary);margin-top:3px;}
.list-box{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.list-row{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border);gap:12px;}
.list-row:last-child{border-bottom:none;}
.step-num{width:28px;height:28px;background:var(--primary);color:#fff;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.step-pour{font-size:18px;font-weight:800;color:var(--text);}
.step-unit{font-size:12px;color:var(--text-3);}
.step-time{margin-left:auto;font-size:14px;color:var(--text-2);font-weight:500;}
.grinder-name{flex:1;font-size:14px;font-weight:500;}
.grinder-clicks{font-size:22px;font-weight:800;color:var(--primary);}
.grinder-unit{font-size:12px;color:var(--text-3);}
.btn-row{display:flex;gap:10px;}
.btn{flex:1;padding:14px;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;transition:transform .12s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 3px 10px rgba(212,98,42,.3);}
.btn-secondary{background:var(--card);color:var(--text);box-shadow:var(--shadow);}
.btn-danger{background:#fff0f0;color:var(--danger);box-shadow:var(--shadow-sm);}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-size:13px;font-weight:700;color:var(--text-2);}
.form-input,.form-select,.form-textarea{padding:13px 14px;background:var(--card);
  border:1.5px solid var(--border);border-radius:12px;color:var(--text);
  font-size:15px;outline:none;width:100%;box-shadow:var(--shadow-sm);}
.form-input:focus,.form-select:focus,.form-textarea:focus{
  border-color:var(--primary);box-shadow:0 0 0 3px rgba(212,98,42,.12);}
.form-select option{background:var(--surface);}
.form-textarea{resize:none;min-height:80px;}
.type-toggle{display:flex;background:var(--card2);border-radius:12px;padding:3px;gap:3px;box-shadow:var(--shadow-sm);}
.type-btn{flex:1;padding:11px;border:none;background:none;color:var(--text-3);font-size:15px;font-weight:600;cursor:pointer;border-radius:10px;}
.type-btn.hot{background:#fff0ed;color:#d04020;box-shadow:var(--shadow-sm);}
.type-btn.ice{background:#eaf4ff;color:#2878c0;box-shadow:var(--shadow-sm);}
.step-card{background:var(--card);border-radius:12px;padding:14px;box-shadow:var(--shadow);}
.step-card-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.step-card-num{width:26px;height:26px;background:var(--primary);color:#fff;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.step-card-label{flex:1;font-size:14px;font-weight:600;color:var(--text-2);}
.step-del{width:30px;height:30px;border:none;background:#fff0f0;color:var(--danger);
  font-size:16px;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.step-inputs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.grinder-form-row{display:flex;align-items:center;background:var(--card);
  border-radius:12px;padding:12px 14px;gap:12px;box-shadow:var(--shadow-sm);}
.grinder-form-name{flex:1;font-size:14px;font-weight:500;}
.grinder-form-input{width:72px;padding:9px;background:var(--card2);
  border:1.5px solid var(--border);border-radius:10px;color:var(--text);
  font-size:16px;font-weight:700;text-align:center;outline:none;}
.grinder-form-input:focus{border-color:var(--primary);}
.roaster-group-label{font-size:11px;font-weight:800;color:var(--text-3);
  text-transform:uppercase;letter-spacing:.1em;padding:12px 4px 6px;
  cursor:pointer;display:flex;align-items:center;gap:4px;}
.roaster-group-label:active{color:var(--primary);}
.empty{text-align:center;padding:24px;color:var(--text-3);font-size:14px;
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);}
/* ── 이미지 ── */
.detail-img{width:100%;border-radius:var(--radius);max-height:240px;object-fit:cover;
  box-shadow:var(--shadow);display:block;}
.img-upload-area{position:relative;border-radius:var(--radius);overflow:hidden;
  background:var(--card2);border:2px dashed var(--border);min-height:120px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:border-color .15s;}
.img-upload-area:active{border-color:var(--primary);}
.img-upload-area img{width:100%;max-height:220px;object-fit:cover;border-radius:calc(var(--radius) - 2px);}
.img-upload-area .img-placeholder{display:flex;flex-direction:column;align-items:center;
  gap:8px;color:var(--text-3);font-size:14px;padding:24px;}
.img-upload-area .img-placeholder span{font-size:32px;}
.img-change-btn{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.55);
  color:#fff;border:none;border-radius:20px;padding:6px 12px;font-size:12px;
  font-weight:600;cursor:pointer;}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);
  background:#222;color:#fff;padding:11px 22px;border-radius:24px;font-size:14px;font-weight:500;
  opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:9999;
  box-shadow:0 4px 16px rgba(0,0,0,.2);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#loading{display:none;position:fixed;inset:0;background:rgba(246,244,241,.75);
  backdrop-filter:blur(2px);z-index:9998;align-items:center;justify-content:center;}
#loading.show{display:flex;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);
  border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.pb24{padding-bottom:calc(80px + env(safe-area-inset-bottom,0px));}
</style>
</head>
<body>
<div id="app">
  <header id="app-header">
    <button class="btn-icon hidden" id="btn-back" onclick="goBack()">←</button>
    <h1 id="header-title">☕ 커피 레시피</h1>
    <button class="btn-icon hidden" id="btn-hdr-edit" onclick="doHdrEdit()">✏️</button>
  </header>
  <div id="screens">

    <!-- HOME -->
    <div id="screen-home" class="screen active">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="text" placeholder="로스터리 또는 원두 이름 검색..."
          oninput="onSearch(this.value)" autocomplete="off">
      </div>
      <div id="home-list"></div>
    </div>

    <!-- ROASTER DETAIL -->
    <div id="screen-roaster" class="screen">
      <div id="roaster-info" class="bean-header"></div>
      <div class="section-label">원두 목록</div>
      <div id="roaster-bean-list"></div>
    </div>

    <!-- ROASTER FORM -->
    <div id="screen-roaster-form" class="screen">
      <input type="hidden" id="rf-id">
      <div class="form-group"><label class="form-label">로스터리 이름</label>
        <input type="text" class="form-input" id="rf-name" placeholder="로스터리 이름"></div>
      <div class="form-group"><label class="form-label">메모</label>
        <textarea class="form-textarea" id="rf-memo" placeholder="디게싱, 기타 정보..."></textarea></div>
      <div class="form-group"><label class="form-label">사진</label>
        <div class="img-upload-area" id="rf-img-area" onclick="triggerImg('rf')">
          <div class="img-placeholder"><span>📷</span>사진 추가</div>
          <button class="img-change-btn" id="rf-img-change" style="display:none">📷 변경</button>
        </div>
        <input type="file" id="rf-img-file" accept="image/*" style="display:none" onchange="onImgPick('rf',this)">
        <input type="hidden" id="rf-img-url">
      </div>
      <div class="btn-row pb24">
        <button class="btn btn-secondary" onclick="goBack()">취소</button>
        <button class="btn btn-primary" onclick="saveRoaster()">저장</button>
      </div>
    </div>

    <!-- BEAN DETAIL -->
    <div id="screen-bean" class="screen">
      <img id="bean-detail-img" class="detail-img" style="display:none">
      <div id="bean-info" class="bean-header"></div>
      <div class="section-label">드립 레시피</div>
      <div id="bean-drip-list"></div>
      <button class="btn btn-secondary" onclick="showDripForm()">+ 드립 레시피 추가</button>
      <div class="section-label" style="margin-top:4px">에스프레소 레시피</div>
      <div id="bean-esp-list"></div>
      <button class="btn btn-secondary" onclick="showEspForm()">+ 에스프레소 레시피 추가</button>
    </div>

    <!-- DRIP DETAIL -->
    <div id="screen-drip" class="screen">
      <img id="drip-detail-img" class="detail-img" style="display:none">
      <div id="drip-info" class="detail-header"></div>
      <div class="section-label">추출 단계</div>
      <div id="drip-steps" class="list-box"></div>
      <div id="drip-grinder-wrap">
        <div class="section-label">그라인더 설정</div>
        <div id="drip-grinders" class="list-box"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="editCurrentDrip()">✏️ 수정</button>
        <button class="btn btn-danger" onclick="deleteCurrentDrip()">🗑 삭제</button>
      </div>
    </div>

    <!-- ESP DETAIL -->
    <div id="screen-esp" class="screen">
      <img id="esp-detail-img" class="detail-img" style="display:none">
      <div id="esp-info" class="detail-header"></div>
      <div id="esp-grinder-wrap">
        <div class="section-label">그라인더 설정</div>
        <div id="esp-grinders" class="list-box"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="editCurrentEsp()">✏️ 수정</button>
        <button class="btn btn-danger" onclick="deleteCurrentEsp()">🗑 삭제</button>
      </div>
    </div>

    <!-- DRIP FORM -->
    <div id="screen-drip-form" class="screen">
      <input type="hidden" id="df-id">
      <div class="form-group"><label class="form-label">드리퍼</label>
        <select class="form-select" id="df-dripper"></select></div>
      <div class="form-group"><label class="form-label">타입</label>
        <div class="type-toggle">
          <button class="type-btn hot" id="tb-hot" onclick="setType('HOT')">☀️ HOT</button>
          <button class="type-btn" id="tb-ice" onclick="setType('ICE')">🧊 ICE</button>
        </div>
        <input type="hidden" id="df-type" value="HOT"></div>
      <div class="form-group"><label class="form-label">원두 용량 (g)</label>
        <input type="text" class="form-input" id="df-dose" placeholder="예: 16, 18-19"></div>
      <div class="form-group"><label class="form-label">온도 (°C)</label>
        <input type="text" class="form-input" id="df-temp" placeholder="예: 93, 92-94"></div>
      <div class="form-group" id="df-ice-wrap" style="display:none">
        <label class="form-label">얼음 중량 (g)</label>
        <input type="number" class="form-input" id="df-ice" placeholder="예: 150"></div>
      <div class="form-group"><label class="form-label">메모</label>
        <textarea class="form-textarea" id="df-note" placeholder="가수 정보, 기타 메모..."></textarea></div>
      <div class="form-group"><label class="form-label">사진</label>
        <div class="img-upload-area" id="df-img-area" onclick="triggerImg('df')">
          <div class="img-placeholder"><span>📷</span>사진 추가</div>
          <button class="img-change-btn" id="df-img-change" style="display:none">📷 변경</button>
        </div>
        <input type="file" id="df-img-file" accept="image/*" style="display:none" onchange="onImgPick('df',this)">
        <input type="hidden" id="df-img-url">
      </div>
      <div class="section-label">추출 단계</div>
      <div id="df-steps" style="display:flex;flex-direction:column;gap:10px"></div>
      <button class="btn btn-secondary" onclick="addStep()">+ 스텝 추가</button>
      <div class="section-label" style="margin-top:4px">그라인더 설정 (선택)</div>
      <div id="df-grinders" style="display:flex;flex-direction:column;gap:8px"></div>
      <div class="btn-row pb24">
        <button class="btn btn-secondary" onclick="goBack()">취소</button>
        <button class="btn btn-primary" onclick="saveDrip()">저장</button>
      </div>
    </div>

    <!-- ESP FORM -->
    <div id="screen-esp-form" class="screen">
      <input type="hidden" id="ef-id">
      <div class="form-group"><label class="form-label">원두 용량 (g)</label>
        <input type="text" class="form-input" id="ef-dose" placeholder="예: 18, 18-19"></div>
      <div class="form-group"><label class="form-label">온도 (°C)</label>
        <input type="text" class="form-input" id="ef-temp" placeholder="예: 93, 92-94"></div>
      <div class="form-group"><label class="form-label">수율 (g)</label>
        <input type="text" class="form-input" id="ef-yield" placeholder="예: 36-42"></div>
      <div class="form-group"><label class="form-label">추출 시간 (초)</label>
        <input type="text" class="form-input" id="ef-time" placeholder="예: 28-30"></div>
      <div class="form-group"><label class="form-label">사진</label>
        <div class="img-upload-area" id="ef-img-area" onclick="triggerImg('ef')">
          <div class="img-placeholder"><span>📷</span>사진 추가</div>
          <button class="img-change-btn" id="ef-img-change" style="display:none">📷 변경</button>
        </div>
        <input type="file" id="ef-img-file" accept="image/*" style="display:none" onchange="onImgPick('ef',this)">
        <input type="hidden" id="ef-img-url">
      </div>
      <div class="section-label" style="margin-top:4px">그라인더 설정 (선택)</div>
      <div id="ef-grinders" style="display:flex;flex-direction:column;gap:8px"></div>
      <div class="btn-row pb24">
        <button class="btn btn-secondary" onclick="goBack()">취소</button>
        <button class="btn btn-primary" onclick="saveEsp()">저장</button>
      </div>
    </div>

    <!-- BEAN FORM -->
    <div id="screen-bean-form" class="screen">
      <input type="hidden" id="bf-id">
      <div class="form-group"><label class="form-label">로스터리</label>
        <select class="form-select" id="bf-roaster"></select></div>
      <div class="form-group"><label class="form-label">원두 이름</label>
        <input type="text" class="form-input" id="bf-name" placeholder="원두 이름"></div>
      <div class="form-group"><label class="form-label">원산지</label>
        <input type="text" class="form-input" id="bf-origin" placeholder="예: 블렌드, 에티오피아"></div>
      <div class="form-group"><label class="form-label">로스팅 레벨</label>
        <select class="form-select" id="bf-roast">
          <option value="">선택</option>
          <option>라이트</option><option>미디엄 라이트</option>
          <option>미디엄</option><option>미디엄 다크</option><option>다크</option>
        </select></div>
      <div class="form-group"><label class="form-label">디게싱 기간</label>
        <input type="text" class="form-input" id="bf-deg" placeholder="예: 5~7일, 3일 이상"></div>
      <div class="form-group"><label class="form-label">비고</label>
        <textarea class="form-textarea" id="bf-note" placeholder="기타 정보..."></textarea></div>
      <div class="form-group"><label class="form-label">사진</label>
        <div class="img-upload-area" id="bf-img-area" onclick="triggerImg('bf')">
          <div class="img-placeholder"><span>📷</span>사진 추가</div>
          <button class="img-change-btn" id="bf-img-change" style="display:none">📷 변경</button>
        </div>
        <input type="file" id="bf-img-file" accept="image/*" style="display:none" onchange="onImgPick('bf',this)">
        <input type="hidden" id="bf-img-url">
      </div>

        <button class="btn btn-secondary" onclick="goBack()">취소</button>

  </div>
</div>
<div id="toast"></div>
<div id="loading"><div class="spinner"></div></div>

<script type="module">
import { initializeApp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { initializeFirestore, persistentLocalCache,
  collection, getDocs, getDocsFromCache,
  doc, addDoc, updateDoc, deleteDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey:"AIzaSyDXKlDLVZVJHO9e41Rhfi2rLiX00yAM-Kw",
  authDomain:"coffee-recipe-74488.firebaseapp.com",
  projectId:"coffee-recipe-74488",
  storageBucket:"coffee-recipe-74488.firebasestorage.app",
  messagingSenderId:"343760449387",
  appId:"1:343760449387:web:5162292ce1b32a28f3262e"
});
const db = initializeFirestore(app,{localCache:persistentLocalCache()});

const toArr = s => s.docs.map(d=>({id:d.id,...d.data()}));
const getCol = async n => toArr(await getDocs(collection(db,n)));
const getColCache = async n => {
  try{const s=await getDocsFromCache(collection(db,n));if(!s.empty)return toArr(s);}catch(e){}
  return getCol(n);
};
const docRef = (c,id) => doc(db,c,id);

const CLOUDINARY = 'https://api.cloudinary.com/v1_1/dd6ughqua/image/upload';
const PRESET = 'coffee_recipe';

const S = {
  stack:[],hdrEditFn:null,stepSeq:0,dirty:false,
  roasters:[],drippers:[],grinders:[],
  beans:[],allDrips:[],allEsps:[],
  recipeCache:{},
  roaster:null,bean:null,drip:null,esp:null,
};

function buildCache(drips,esps){
  const c={};
  drips.forEach(r=>{c[r.id]={steps:r.steps||[],grinder_settings:r.grinder_settings||[]};});
  esps.forEach(r=>{c['esp_'+r.id]={steps:[],grinder_settings:r.grinder_settings||[]};});
  return c;
}
function enrich(){
  const rm={},dm={};
  S.roasters.forEach(r=>{rm[r.id]=r.Roaster_Name;});
  S.drippers.forEach(d=>{dm[d.id]=d.Dripper_Name;});
  S.beans.forEach(b=>{b.Roaster_Name=rm[b.Roaster_REF]||'';});
  S.allDrips.forEach(r=>{r.Dripper_Name=dm[r.Dripper_REF]||r.Dripper_REF;});
}

// ── Navigation ──
function showScr(id,title,opt={}){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById(id).scrollTop=0;
  document.getElementById('header-title').textContent=title;
  document.getElementById('btn-back').classList.toggle('hidden',!opt.back);
  document.getElementById('btn-hdr-edit').classList.toggle('hidden',!opt.edit);
  S.hdrEditFn=opt.edit||null;
}
function pushScr(id,title,opt={}){S.stack.push({id,title,opt});showScr(id,title,opt);history.pushState(null,'');}
function goBack(){
  if(S.stack.length<2)return;
  S.stack.pop();
  const p=S.stack[S.stack.length-1];
  showScr(p.id,p.title,p.opt);
  if(S.dirty){
    if(p.id==='screen-bean'&&S.bean)renderBeanDetail();
    if(p.id==='screen-roaster'&&S.roaster)renderRoasterDetail();
    if(p.id==='screen-home')renderHome();
    S.dirty=false;
  }
}
window.addEventListener('popstate',()=>{if(S.stack.length>1)goBack();history.pushState(null,'');});
function doHdrEdit(){S.hdrEditFn&&S.hdrEditFn();}

// ── Loading / Toast ──
function loading(on){document.getElementById('loading').classList.toggle('show',on);}
let _tt;
function toast(msg,err=false){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.background=err?'#c03030':'#222';
  el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2500);
}
async function run(fn){loading(true);try{return await fn();}catch(e){toast('오류: '+e.message,true);}finally{loading(false);}}

// ── 이미지 업로드 ──
async function uploadImg(file){
  const fd=new FormData();fd.append('file',file);fd.append('upload_preset',PRESET);
  const res=await fetch(CLOUDINARY,{method:'POST',body:fd});
  const d=await res.json();
  if(d.error)throw new Error(d.error.message);
  return d.secure_url;
}
function triggerImg(field){document.getElementById(field+'-img-file').click();}
async function onImgPick(field,input){
  const file=input.files[0];if(!file)return;
  loading(true);
  try{
    const url=await uploadImg(file);
    setImgField(field,url);
  }catch(e){toast('이미지 업로드 실패: '+e.message,true);}
  finally{loading(false);}
}
function setImgField(field,url){
  document.getElementById(field+'-img-url').value=url||'';
  const area=document.getElementById(field+'-img-area');
  const chg=document.getElementById(field+'-img-change');
  if(url){
    const ph=area.querySelector('.img-placeholder');
    let img=area.querySelector('img.uploaded');
    if(!img){img=document.createElement('img');img.className='uploaded';img.style.cssText='width:100%;max-height:220px;object-fit:cover;border-radius:calc(var(--radius) - 2px)';area.insertBefore(img,ph);}
    img.src=url;ph.style.display='none';chg.style.display='block';
  }else{
    const img=area.querySelector('img.uploaded');
    if(img)img.remove();
    area.querySelector('.img-placeholder').style.display='flex';
    chg.style.display='none';
  }
}

// ── Init ──
async function loadAll(useCache){
  const g=useCache?getColCache:getCol;
  const [ro,be,dr,gr,rd,re]=await Promise.all([
    g('roasters'),g('beans'),g('drippers'),g('grinders'),
    g('recipe_drip'),g('recipe_espresso'),
  ]);
  S.roasters=ro;S.beans=be;S.drippers=dr;S.grinders=gr;
  S.allDrips=rd;S.allEsps=re;
  enrich();S.recipeCache=buildCache(S.allDrips,S.allEsps);
}
async function initApp(){
  S.stack=[{id:'screen-home',title:'☕ 커피 레시피',opt:{}}];
  showScr('screen-home','☕ 커피 레시피',{});
  history.pushState(null,'');
  await run(async()=>{await loadAll(true);renderHome();});
  loadAll(false).then(()=>{enrich();S.recipeCache=buildCache(S.allDrips,S.allEsps);renderHome();}).catch(()=>{});
}
async function refreshAll(){
  const [be,rd,re]=await Promise.all([getCol('beans'),getCol('recipe_drip'),getCol('recipe_espresso')]);
  S.beans=be;S.allDrips=rd;S.allEsps=re;
  enrich();S.recipeCache=buildCache(S.allDrips,S.allEsps);S.dirty=true;
}
async function refreshRoasters(){
  S.roasters=await getCol('roasters');enrich();S.dirty=true;
}

// ── Home ──
function renderHome(){
  const el=document.getElementById('home-list');
  const map={};
  S.roasters.forEach(r=>{map[r.id]={name:r.Roaster_Name,img:r.image_url||'',beans:[]};});
  S.beans.forEach(b=>{if(map[b.Roaster_REF])map[b.Roaster_REF].beans.push(b);});
  let html=`
  <div style="display:flex;gap:8px;margin-bottom:4px">
    <button class="btn btn-secondary" style="flex:1" onclick="showBeanForm()">+ 원두 추가</button>
    <button class="btn btn-secondary" style="flex:1" onclick="showRoasterForm()">+ 로스터리 추가</button>
  </div>`;
Object.values(map).forEach((g,i)=>{
    if(!g.beans.length)return;
    const rid=S.roasters.find(r=>r.Roaster_Name===g.name)?.id||'';
    html+=`<div class="roaster-group-label" onclick="openRoaster('${rid}')">
      ${g.img?`<img src="${g.img}" style="width:20px;height:20px;border-radius:50%;object-fit:cover">`:''} ${g.name} ›</div>`;
    g.beans.forEach(b=>{html+=beanCardHTML(b,false);});
  });
  el.innerHTML=html;
}
function beanCardHTML(b,showSub){
  const r=b.Roast_Level?`<span class="tag tag-roast">${b.Roast_Level}</span>`:'';
  const d=b.Degassing_Days?`<span class="tag tag-deg">⏱ ${b.Degassing_Days}</span>`:'';
  const s=(showSub&&b.Roaster_Name)?`<div class="card-sub">${b.Roaster_Name}</div>`:'';
  const img=b.image_url?`<img src="${b.image_url}" style="width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0">`:'';
  return`<div class="card" style="margin-bottom:8px;display:flex;align-items:center;gap:12px" onclick="openBean('${b.id}')">
    ${img}<div style="flex:1;min-width:0"><div class="card-title">${b.Bean_Name}</div>${s}<div class="card-tags">${r}${d}</div></div></div>`;
}
let _st;
function onSearch(v){
  clearTimeout(_st);const el=document.getElementById('home-list');
  if(!v.trim()){renderHome();return;}
  _st=setTimeout(()=>{
    const kw=v.toLowerCase();
    const res=S.beans.filter(b=>(b.Bean_Name||'').toLowerCase().includes(kw)||
      (b.Roaster_Name||'').toLowerCase().includes(kw)||(b.Origin||'').toLowerCase().includes(kw));
    el.innerHTML=res.length?res.map(b=>beanCardHTML(b,true)).join(''):'<div class="empty">검색 결과 없음</div>';
  },200);
}

// ── Roaster ──
function openRoaster(id){
  S.roaster=S.roasters.find(r=>r.id===id);if(!S.roaster)return;
  pushScr('screen-roaster',S.roaster.Roaster_Name,{back:true,edit:()=>showRoasterForm(id)});
  renderRoasterDetail();
}
function renderRoasterDetail(){
  const ro=S.roaster;
  document.getElementById('roaster-info').innerHTML=`
    ${ro.image_url?`<img src="${ro.image_url}" style="width:100%;max-height:200px;object-fit:cover;border-radius:10px;margin-bottom:14px">`:''}
    <div class="bean-name">${ro.Roaster_Name}</div>
    ${ro.Memo?`<div class="bean-note" style="margin-top:10px">${ro.Memo}</div>`:''}`;
  const beans=S.beans.filter(b=>b.Roaster_REF===ro.id);
  document.getElementById('roaster-bean-list').innerHTML=beans.length
    ?beans.map(b=>beanCardHTML(b,false)).join('')
    :'<div class="empty">원두 없음</div>';
}
function showRoasterForm(id=null){
  pushScr('screen-roaster-form',id?'로스터리 수정':'로스터리 추가',{back:true});
  ['rf-id','rf-name','rf-memo'].forEach(i=>document.getElementById(i).value='');
  setImgField('rf','');
  if(id){
    const ro=S.roasters.find(r=>r.id===id);if(!ro)return;
    document.getElementById('rf-id').value=ro.id;
    document.getElementById('rf-name').value=ro.Roaster_Name||'';
    document.getElementById('rf-memo').value=ro.Memo||'';
    if(ro.image_url)setImgField('rf',ro.image_url);
  }
}
async function saveRoaster(){
  const id=document.getElementById('rf-id').value;
  const name=document.getElementById('rf-name').value.trim();
  if(!name){toast('로스터리 이름을 입력하세요',true);return;}
  const data={Roaster_Name:name,Memo:document.getElementById('rf-memo').value,
    image_url:document.getElementById('rf-img-url').value||''};
  await run(async()=>{
    if(id)await updateDoc(docRef('roasters',id),data);
    else await addDoc(collection(db,'roasters'),data);
    await refreshRoasters();toast('저장되었습니다 ✓');goBack();
  });
}

// ── Bean ──
function openBean(id){
  S.bean=S.beans.find(b=>b.id===id);if(!S.bean)return;
  pushScr('screen-bean',S.bean.Bean_Name,{back:true,edit:()=>showBeanForm(id)});
  renderBeanDetail();
}
function renderBeanDetail(){
  const b=S.bean;
  const ro=S.roasters.find(r=>r.id===b.Roaster_REF);
  const img=document.getElementById('bean-detail-img');
  if(b.image_url){img.src=b.image_url;img.style.display='block';}else{img.style.display='none';}
  document.getElementById('bean-info').innerHTML=`
    <div class="bean-name">${b.Bean_Name}</div>
    <div class="bean-roaster">${ro?ro.Roaster_Name:''}</div>
    <div class="info-grid">
      <div class="info-item"><label>원산지</label><span>${b.Origin||'-'}</span></div>
      <div class="info-item"><label>로스팅</label><span>${b.Roast_Level||'-'}</span></div>
      <div class="info-item"><label>디게싱</label><span>${b.Degassing_Days||'-'}</span></div>
    </div>
    ${b.Note?`<div class="bean-note">${b.Note}</div>`:''}`;
  const drips=S.allDrips.filter(r=>r.Bean_REF===b.id);
  const esps=S.allEsps.filter(r=>r.Bean_REF===b.id);
  document.getElementById('bean-drip-list').innerHTML=drips.length
    ?drips.map(r=>`<div class="recipe-card" onclick="openDrip('${r.id}')">
        ${r.image_url?`<img src="${r.image_url}" style="width:100%;height:120px;object-fit:cover;border-radius:10px;margin-bottom:10px">`:''}
        <div class="card-row"><span style="font-weight:700">${r.Dripper_Name}</span>
          <span class="tag ${r.Type==='ICE'?'tag-ice':'tag-hot'}">${r.Type||'-'}</span></div>
        <div class="recipe-stats">
          <div class="stat-cell"><div class="stat-v">${r.Dose_g}</div><div class="stat-l">g</div></div>
          <div class="stat-cell"><div class="stat-v">${r.Temp_c||'-'}</div><div class="stat-l">°C</div></div>
          <div class="stat-cell"><div class="stat-v">${r.Total_Pour||'-'}</div><div class="stat-l">ml</div></div>
        </div></div>`).join('')
    :'<div class="empty">레시피 없음</div>';
  document.getElementById('bean-esp-list').innerHTML=esps.length
    ?esps.map(r=>`<div class="recipe-card" onclick="openEsp('${r.id}')">
        ${r.image_url?`<img src="${r.image_url}" style="width:100%;height:120px;object-fit:cover;border-radius:10px;margin-bottom:10px">`:''}
        <div class="card-row"><span style="font-weight:700">에스프레소</span>
          <span class="tag tag-esp">ESP</span></div>
        <div class="recipe-stats">
          <div class="stat-cell"><div class="stat-v">${r.Dose_g}</div><div class="stat-l">Dose</div></div>
          <div class="stat-cell"><div class="stat-v">${r.Yield_g}</div><div class="stat-l">Yield</div></div>
          <div class="stat-cell"><div class="stat-v">${r.Time_Sec}</div><div class="stat-l">Sec</div></div>
        </div></div>`).join('')
    :'<div class="empty">레시피 없음</div>';
}
function gName(gid){return(S.grinders.find(g=>g.id===gid)||{}).Grinder_Name||gid;}

// ── Drip Detail ──
function openDrip(id){
  S.drip=S.allDrips.find(r=>r.id===id);if(!S.drip)return;
  pushScr('screen-drip',`${S.drip.Dripper_Name} ${S.drip.Type||''}`,{back:true});
  const{steps,grinder_settings:gs}=S.recipeCache[id]||{steps:[],grinder_settings:[]};
  const r=S.drip;
  const img=document.getElementById('drip-detail-img');
  if(r.image_url){img.src=r.image_url;img.style.display='block';}else{img.style.display='none';}
  document.getElementById('drip-info').innerHTML=`
    <div class="card-row">
      <span style="font-size:19px;font-weight:800">${r.Dripper_Name}</span>
      <span class="tag ${r.Type==='ICE'?'tag-ice':'tag-hot'}">${r.Type||'-'}</span>
    </div>
    <div class="detail-grid">
      <div class="detail-item"><label>원두</label><span>${r.Dose_g}g</span></div>
      <div class="detail-item"><label>온도</label><span>${r.Temp_c||'-'}°</span></div>
      <div class="detail-item"><label>총 물량</label><span>${r.Total_Pour||'-'}ml</span></div>
      ${r.Ice_g?`<div class="detail-item"><label>얼음</label><span>${r.Ice_g}g</span></div>`:''}
    </div>
    ${r.Note?`<div class="bean-note" style="margin-top:12px">${r.Note}</div>`:''}`;
  document.getElementById('drip-steps').innerHTML=steps.length
    ?steps.map(s=>{
      const t=(s.Time_Min?s.Time_Min+'분 ':'')+(s.Time_Sec?s.Time_Sec+'초':'');
      return`<div class="list-row"><div class="step-num">${s.Step_Num}</div>
        <div><span class="step-pour">${s.Pour_g}</span><span class="step-unit"> g</span></div>
        ${t.trim()?`<div class="step-time">⏱ ${t.trim()}</div>`:''}</div>`;
    }).join('')
    :'<div style="padding:16px;text-align:center;color:var(--text-3)">스텝 없음</div>';
  const gw=document.getElementById('drip-grinder-wrap');
  if(!gs.length){gw.style.display='none';}
  else{
    gw.style.display='block';
    document.getElementById('drip-grinders').innerHTML=gs.map(g=>
      `<div class="list-row"><span class="grinder-name">${gName(g.Grinder_REF)}</span>
        <span class="grinder-clicks">${g.Clicks}</span><span class="grinder-unit"> 클릭</span></div>`).join('');
  }
}
function editCurrentDrip(){S.drip&&showDripForm(S.drip.id);}
async function deleteCurrentDrip(){
  if(!confirm('이 드립 레시피를 삭제할까요?'))return;
  await run(async()=>{
    await deleteDoc(docRef('recipe_drip',S.drip.id));
    await refreshAll();toast('삭제되었습니다');
    S.stack.splice(-2,2);const p=S.stack[S.stack.length-1];
    showScr(p.id,p.title,p.opt);renderBeanDetail();S.dirty=false;
  });
}

// ── ESP Detail ──
function openEsp(id){
  S.esp=S.allEsps.find(r=>r.id===id);if(!S.esp)return;
  pushScr('screen-esp','에스프레소',{back:true});
  const{grinder_settings:gs}=S.recipeCache['esp_'+id]||{grinder_settings:[]};
  const r=S.esp;
  const img=document.getElementById('esp-detail-img');
  if(r.image_url){img.src=r.image_url;img.style.display='block';}else{img.style.display='none';}
  document.getElementById('esp-info').innerHTML=`
    <div class="card-row">
      <span style="font-size:19px;font-weight:800">에스프레소</span>
      <span class="tag tag-esp">ESP</span>
    </div>
    <div class="detail-grid">
      <div class="detail-item"><label>Dose</label><span>${r.Dose_g}g</span></div>
      <div class="detail-item"><label>온도</label><span>${r.Temp_c||'-'}°</span></div>
      <div class="detail-item"><label>Yield</label><span>${r.Yield_g}g</span></div>
      <div class="detail-item"><label>시간</label><span>${r.Time_Sec}초</span></div>
    </div>`;

  if(!gs.length){gw.style.display='none';}
  else{
    gw.style.display='block';
    document.getElementById('esp-grinders').innerHTML=gs.map(g=>
      `<div class="list-row"><span class="grinder-name">${gName(g.Grinder_REF)}</span>
        <span class="grinder-clicks">${g.Clicks}</span><span class="grinder-unit"> 클릭</span></div>`).join('');
  }
}
function editCurrentEsp(){S.esp&&showEspForm(S.esp.id);}
async function deleteCurrentEsp(){
  if(!confirm('이 에스프레소 레시피를 삭제할까요?'))return;
  await run(async()=>{
    await deleteDoc(docRef('recipe_espresso',S.esp.id));
    await refreshAll();toast('삭제되었습니다');
    S.stack.splice(-2,2);const p=S.stack[S.stack.length-1];
    showScr(p.id,p.title,p.opt);renderBeanDetail();S.dirty=false;
  });
}

// ── Drip Form ──
function showDripForm(id=null){
  pushScr('screen-drip-form',id?'드립 레시피 수정':'드립 레시피 추가',{back:true});
  document.getElementById('df-dripper').innerHTML=
    S.drippers.map(d=>`<option value="${d.id}">${d.Dripper_Name}</option>`).join('');
  ['df-id','df-dose','df-temp','df-ice','df-note'].forEach(i=>document.getElementById(i).value='');
  setType('HOT');document.getElementById('df-steps').innerHTML='';S.stepSeq=0;
  setImgField('df','');renderGrForm('df-grinders',[]);
  if(id){
    const r=S.allDrips.find(x=>x.id===id);if(!r)return;
    const{steps,grinder_settings:gs}=S.recipeCache[id]||{steps:[],grinder_settings:[]};
    document.getElementById('df-id').value=r.id;
    document.getElementById('df-dripper').value=r.Dripper_REF;
    setType(r.Type||'HOT');
    document.getElementById('df-dose').value=r.Dose_g||'';
    document.getElementById('df-temp').value=r.Temp_c||'';
    document.getElementById('df-ice').value=r.Ice_g||'';
    document.getElementById('df-note').value=r.Note||'';
    if(r.image_url)setImgField('df',r.image_url);
    steps.forEach(s=>addStep(s));renderGrForm('df-grinders',gs);
  }
}
function setType(t){
  document.getElementById('df-type').value=t;
  document.getElementById('tb-hot').className='type-btn'+(t==='HOT'?' hot':'');
  document.getElementById('tb-ice').className='type-btn'+(t==='ICE'?' ice':'');
  document.getElementById('df-ice-wrap').style.display=t==='ICE'?'flex':'none';
}
function addStep(data=null){
  S.stepSeq++;const sid='sc-'+S.stepSeq;
  const el=document.getElementById('df-steps');const num=el.children.length+1;
  const d=document.createElement('div');d.className='step-card';d.id=sid;
  d.innerHTML=`<div class="step-card-header">
    <div class="step-card-num">${num}</div>
    <div class="step-card-label">스텝 ${num}</div>
    <button class="step-del" onclick="removeStep('${sid}')">✕</button></div>
    <div class="step-inputs">
      <div class="form-group"><label class="form-label">물량(g)</label>
        <input type="number" class="form-input sp-pour" value="${data?data.Pour_g:''}"></div>
      <div class="form-group"><label class="form-label">분</label>
        <input type="number" class="form-input sp-min" value="${data&&data.Time_Min?data.Time_Min:''}"></div>
      <div class="form-group"><label class="form-label">초</label>
        <input type="number" class="form-input sp-sec" value="${data&&data.Time_Sec?data.Time_Sec:''}"></div>
    </div>`;
  el.appendChild(d);
}
function removeStep(sid){
  document.getElementById(sid)?.remove();
  Array.from(document.getElementById('df-steps').children).forEach((c,i)=>{
    c.querySelector('.step-card-num').textContent=i+1;
    c.querySelector('.step-card-label').textContent=`스텝 ${i+1}`;
  });
}
function renderGrForm(cid,existing){
  const map={};existing.forEach(s=>{map[s.Grinder_REF]=s.Clicks;});
  document.getElementById(cid).innerHTML=S.grinders.map(g=>`
    <div class="grinder-form-row">
      <span class="grinder-form-name">${g.Grinder_Name}</span>
      <input type="number" class="grinder-form-input" id="${cid}-${g.id}"
        placeholder="-" value="${map[g.id]||''}">
      <span class="grinder-unit">클릭</span></div>`).join('');
}
function collectGr(cid){
  return S.grinders.map(g=>{
    const v=document.getElementById(`${cid}-${g.id}`)?.value;
    return v?{Grinder_REF:g.id,Clicks:Number(v)}:null;
  }).filter(Boolean);
}
async function saveDrip(){
  const id=document.getElementById('df-id').value;
  const steps=Array.from(document.getElementById('df-steps').children).map((c,i)=>({
    Step_Num:i+1,
    Pour_g:Number(c.querySelector('.sp-pour').value)||0,
    Time_Min:Number(c.querySelector('.sp-min').value)||0,
    Time_Sec:Number(c.querySelector('.sp-sec').value)||0,
  }));
  if(!steps.length){toast('스텝을 1개 이상 추가하세요',true);return;}
  const data={
    Bean_REF:S.bean.id,
    Dripper_REF:document.getElementById('df-dripper').value,
    Type:document.getElementById('df-type').value,
    Dose_g:document.getElementById('df-dose').value,
    Temp_c:document.getElementById('df-temp').value,
    Ice_g:document.getElementById('df-ice').value||'',
    Note:document.getElementById('df-note').value,
    image_url:document.getElementById('df-img-url').value||'',
    Total_Pour:steps.reduce((s,x)=>s+x.Pour_g,0),
    steps,grinder_settings:collectGr('df-grinders'),
  };
  await run(async()=>{
    if(id)await updateDoc(docRef('recipe_drip',id),data);
    else await addDoc(collection(db,'recipe_drip'),data);
    await refreshAll();toast('저장되었습니다 ✓');goBack();
  });
}

// ── ESP Form ──
function showEspForm(id=null){
  pushScr('screen-esp-form',id?'에스프레소 수정':'에스프레소 추가',{back:true});
  ['ef-id','ef-dose','ef-temp','ef-yield','ef-time'].forEach(i=>document.getElementById(i).value='');
  setImgField('ef','');renderGrForm('ef-grinders',[]);
  if(id){
    const r=S.allEsps.find(x=>x.id===id);if(!r)return;
    const{grinder_settings:gs}=S.recipeCache['esp_'+id]||{grinder_settings:[]};
    document.getElementById('ef-id').value=r.id;
    document.getElementById('ef-dose').value=r.Dose_g||'';
    document.getElementById('ef-temp').value=r.Temp_c||'';
    document.getElementById('ef-yield').value=r.Yield_g||'';
    document.getElementById('ef-time').value=r.Time_Sec||'';
    if(r.image_url)setImgField('ef',r.image_url);
    renderGrForm('ef-grinders',gs);
  }
}
async function saveEsp(){
  const id=document.getElementById('ef-id').value;
  const data={
    Bean_REF:S.bean.id,
    Dose_g:document.getElementById('ef-dose').value,
    Temp_c:document.getElementById('ef-temp').value,
    Yield_g:document.getElementById('ef-yield').value,
    Time_Sec:document.getElementById('ef-time').value,
    image_url:document.getElementById('ef-img-url').value||'',
    grinder_settings:collectGr('ef-grinders'),
  };
  await run(async()=>{
    if(id)await updateDoc(docRef('recipe_espresso',id),data);
    else await addDoc(collection(db,'recipe_espresso'),data);
    await refreshAll();toast('저장되었습니다 ✓');goBack();
  });
}

// ── Bean Form ──
function showBeanForm(id=null){
  pushScr('screen-bean-form',id?'원두 수정':'원두 추가',{back:true});
  document.getElementById('bf-roaster').innerHTML=
    S.roasters.map(r=>`<option value="${r.id}">${r.Roaster_Name}</option>`).join('');
  ['bf-id','bf-name','bf-origin','bf-deg','bf-note'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('bf-roast').value='';
  setImgField('bf','');
  if(id){
    const b=S.beans.find(x=>x.id===id);if(!b)return;
    document.getElementById('bf-id').value=b.id;
    document.getElementById('bf-roaster').value=b.Roaster_REF;
    document.getElementById('bf-name').value=b.Bean_Name||'';
    document.getElementById('bf-origin').value=b.Origin||'';
    document.getElementById('bf-roast').value=b.Roast_Level||'';
    document.getElementById('bf-deg').value=b.Degassing_Days||'';
    document.getElementById('bf-note').value=b.Note||'';
    if(b.image_url)setImgField('bf',b.image_url);
  }
}
async function saveBean(){
  const id=document.getElementById('bf-id').value;
  const name=document.getElementById('bf-name').value.trim();
  if(!name){toast('원두 이름을 입력하세요',true);return;}
  const data={
    Roaster_REF:document.getElementById('bf-roaster').value,
    Bean_Name:name,Origin:document.getElementById('bf-origin').value,
    Roast_Level:document.getElementById('bf-roast').value,
    Degassing_Days:document.getElementById('bf-deg').value,
    Note:document.getElementById('bf-note').value,
    image_url:document.getElementById('bf-img-url').value||'',
  };
  await run(async()=>{
    if(id)await updateDoc(docRef('beans',id),data);
    else await addDoc(collection(db,'beans'),data);
    await refreshAll();toast('저장되었습니다 ✓');goBack();
  });
}

Object.assign(window,{
  goBack,doHdrEdit,onSearch,triggerImg,onImgPick,
  openRoaster,showRoasterForm,saveRoaster,
  openBean,showBeanForm,saveBean,
  openDrip,editCurrentDrip,deleteCurrentDrip,showDripForm,setType,addStep,removeStep,saveDrip,
  openEsp,editCurrentEsp,deleteCurrentEsp,showEspForm,saveEsp,
});

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
initApp();
</script>
